services:
  app:
    build:
      context: .
      target: runtime
    image: agent-auto-system:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: agent-auto-system
    volumes:
      - app_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 4

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app_data:
    driver: local
  prom_data:
    driver: local
