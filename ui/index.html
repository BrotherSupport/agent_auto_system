<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Auto System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --accent: #6366f1;
      --accent-dim: #4f46e5;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --gray: #64748b;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .logo { font-weight: 700; font-size: 1rem; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }

    /* ── Hero ── */
    .hero {
      padding: 5rem 2rem 4rem;
      text-align: center;
      max-width: 640px;
      margin: 0 auto;
    }
    .hero h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.15; }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p { margin-top: 1rem; color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; }
    .hero-actions { margin-top: 2rem; display: flex; gap: 0.75rem; justify-content: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); }

    /* ── History section ── */
    .section {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-header h2 { font-size: 1rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Table ── */
    .table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead { background: var(--surface); }
    th { padding: 0.65rem 1rem; text-align: left; color: var(--text-muted); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.75rem 1rem; border-top: 1px solid var(--border); vertical-align: middle; }
    tr.data-row { cursor: pointer; transition: background 0.1s; }
    tr.data-row:hover { background: rgba(99,102,241,0.06); }

    /* ── Status badge ── */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge-pending  { background: rgba(100,116,139,0.2); color: var(--gray); }
    .badge-running  { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-success  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge-failed   { background: rgba(239,68,68,0.15);  color: var(--red); }

    /* ── Detail row ── */
    tr.detail-row td { background: #0a1120; padding: 0; }
    tr.detail-row pre {
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .hidden { display: none !important; }

    .empty-state { text-align: center; color: var(--text-muted); padding: 3rem !important; }

    /* ── Error banner ── */
    #error-banner {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--red);
      color: #fff;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 100;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      backdrop-filter: blur(2px);
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      width: 100%;
      max-width: 440px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }

    /* ── Form fields ── */
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .field input, .field select, .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.55rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field select option { background: var(--surface); }

    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

    /* ── Live indicator ── */
    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">agent<span>auto</span></div>
  <button class="btn btn-primary" id="new-run-btn">+ New Run</button>
</header>

<section class="hero">
  <h1>Automate anything<br/>with <em>AI agents</em></h1>
  <p>Define jobs, trigger them with one click, and let CrewAI agents execute them in the background.</p>
  <div class="hero-actions">
    <button class="btn btn-primary" id="hero-run-btn">Run automation</button>
    <a href="/docs" class="btn btn-ghost" target="_blank">API docs</a>
  </div>
</section>

<div class="section">
  <div class="section-header">
    <h2>Run History</h2>
    <span id="live-indicator" class="hidden"><span class="pulse"></span></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Job</th>
          <th>Status</th>
          <th>Started</th>
          <th>Duration</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody id="history-tbody">
        <tr><td colspan="6" class="empty-state">No runs yet. Click "New Run" to get started.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3>New Automation Run</h3>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <form id="run-form">
      <div class="field">
        <label>Automation Type</label>
        <select id="job-type" onchange="switchJobType(this.value)">
          <option value="google_form_fill">Google Form Fill</option>
          <option value="web_scraper">Web Scraper</option>
          <option value="hacker_news_digest">Hacker News Digest</option>
        </select>
      </div>

      <!-- google_form_fill fields -->
      <div id="fields-google_form_fill">
        <div class="field">
          <label>Company Name</label>
          <input type="text" id="company-name" placeholder="e.g. Acme Corp" />
        </div>
        <div class="field">
          <label>Company Size</label>
          <select id="company-size">
            <option value="0-10">0 – 10</option>
            <option value="11-100">11 – 100</option>
            <option value="200 up">200+</option>
            <option value="其他">其他 (Other)</option>
          </select>
        </div>
        <div class="field">
          <label>AI Problem to Solve</label>
          <textarea id="ai-problem" placeholder="Describe what you want AI to solve..."></textarea>
        </div>
      </div>

      <!-- web_scraper fields -->
      <div id="fields-web_scraper" class="hidden">
        <div class="field">
          <label>URL to Scrape</label>
          <input type="url" id="scrape-url" placeholder="https://example.com" />
        </div>
        <div class="field">
          <label>Question to Answer</label>
          <textarea id="scrape-question" placeholder="What is this page about?"></textarea>
        </div>
      </div>

      <!-- hacker_news_digest fields -->
      <div id="fields-hacker_news_digest" class="hidden">
        <div class="field">
          <label>Number of Stories (1–10)</label>
          <input type="number" id="hn-limit" value="5" min="1" max="10" />
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
        <button type="submit" class="btn btn-primary">Run ▶</button>
      </div>
    </form>
  </div>
</div>

<div id="error-banner" class="hidden"></div>

<script src="/ui/app.js"></script>
</body>
</html>
