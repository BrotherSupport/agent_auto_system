write_proposal_task:
  description: >
    為以下 tasker.com.tw 案件撰寫一段提案說明 (提案說明)。

    案件標題：{case_title}

    案件內容（節錄）：
    {case_description}

    你的初次估價區間：{min_charge} ~ {max_charge} 元（此資訊已另外填入表單，
    提案說明中可自然帶到「上方報價」，但不要重複貼出數字或列點報價）。

    撰寫要求：
    - 使用繁體中文，語氣專業、有禮、真誠。
    - 3~5 句話，約 80~200 字，可直接送出，不要有待填空格或佔位符。
    - 針對此案件需求客製，展現你理解重點；不要寫成通用罐頭訊息。
    - 不捏造具體的公司名、客戶名或不存在的作品連結。
    - 若沒有足夠案件內容，就寫一段誠懇、可套用於此類需求的通用提案。
    - 只輸出提案說明本文，不要標題、引號、Markdown、或任何額外說明。
    參考可用的預設範本（可改寫或無視）：{proposal_template}
    若這是重試，請修正上次的問題：{previous_error}
  expected_output: >
    一段可直接送出的繁體中文提案說明純文字（不含標題、引號或 Markdown 標記）。
  agent: proposal_writer
