write_proposal_task:
  description: >
    為以下 tasker.com.tw 案件撰寫一段提案說明 (提案說明)。

    案件標題：{case_title}

    案件內容（節錄）：
    {case_description}

    你的初次估價區間：{min_charge} ~ {max_charge} 元（此資訊已另外填入表單，
    提案說明中可自然帶到「上方報價」，但不要重複貼出數字或列點報價）。

    撰寫要求：
    - 使用繁體中文，語氣專業、有禮、真誠。
    - 開頭 3~5 句話針對此案件需求客製，展現你理解重點；不要寫成通用罐頭訊息。
    - 客製開頭之後，務必「原樣、完整」保留下方範本中的「專案連結清單」與
      「個人簡介」段落（含每一條網址與文字），不可刪改、縮寫或改寫這些連結與簡介。
    - 除範本已提供的連結外，不要捏造其他不存在的公司名、客戶名或作品連結。
    - 整體可直接送出，不要有待填空格或佔位符。
    - 若沒有足夠案件內容，開頭就寫一段誠懇、可套用於此類需求的通用提案，
      再接上範本的連結與簡介段落。
    - 只輸出提案說明本文，不要標題、引號、Markdown、或任何額外說明。
    必須沿用的提案範本（客製開頭，並原樣保留其中的專案連結與個人簡介）：
    {proposal_template}
    若這是重試，請修正上次的問題：{previous_error}
  expected_output: >
    一段可直接送出的繁體中文提案說明純文字（不含標題、引號或 Markdown 標記）。
  agent: proposal_writer
